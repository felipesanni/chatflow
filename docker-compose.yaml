services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatflow
      POSTGRES_USER: chatflow
      POSTGRES_PASSWORD: chatflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatflow -d chatflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3333
      API_LOG_LEVEL: info
      DATABASE_URL: postgresql://chatflow:chatflow@postgres:5432/chatflow
      SESSION_SECRET: change-this-in-production
      WEB_APP_URL: https://web.seu-dominio.com
      ADMIN_BOOTSTRAP_EMAIL: admin@chatflow.local
      ADMIN_BOOTSTRAP_PASSWORD: change-this-password
      ADMIN_BOOTSTRAP_NAME: Administrador ChatFlow
    ports:
      - "3333:3333"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      API_PROXY_TARGET: http://api:3333/api
      NEXT_PUBLIC_SOCKET_URL: https://api.seu-dominio.com
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
